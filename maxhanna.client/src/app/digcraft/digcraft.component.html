<div class="digcraft-container">
  <!-- Loading -->
  <div *ngIf="loading" class="loading-screen">
    <span>Loading DigCraft…</span>
  </div>

  <!-- Canvas -->
  <canvas #gameCanvas class="game-canvas" [class.hidden]="!joined"></canvas>

  <!-- Crosshair -->
  <div class="crosshair" *ngIf="joined && !showInventory && !showCrafting">+</div>

  <!-- HUD -->
  <div class="hud" *ngIf="joined">
    <!-- Health & Hunger -->
    <div class="status-bar">
      <div class="health-bar">
        <span *ngFor="let h of [].constructor(Math.ceil(health / 2))" class="heart">&#10084;</span>
      </div>
      <div class="hunger-bar">
        <span *ngFor="let h of [].constructor(Math.ceil(hunger / 2))" class="food">&#127830;</span>
      </div>
    </div>

    <!-- Hotbar -->
    <div class="hotbar">
      <div *ngFor="let slot of inventory.slice(0, 9); let i = index"
           class="hotbar-slot"
           [class.selected]="i === selectedSlot"
           (click)="selectHotbarSlot(i)">
        <div class="item-icon"
             *ngIf="slot.quantity > 0"
             [style.background]="getItemColor(slot.itemId)">
        </div>
        <span class="item-qty" *ngIf="slot.quantity > 1">{{slot.quantity}}</span>
        <span class="slot-num">{{i + 1}}</span>
      </div>
    </div>

    <!-- Touch controls -->
    <div class="touch-controls">
      <button class="touch-btn break-btn" (touchstart)="onTouchBreak()">⛏</button>
      <button class="touch-btn place-btn" (touchstart)="onTouchPlace()">🧱</button>
      <button class="touch-btn jump-btn" (touchstart)="onTouchJump()">⬆</button>
      <button class="touch-btn inv-btn" (click)="showInventory = !showInventory; showCrafting = false">🎒</button>
      <button class="touch-btn craft-btn" (click)="showCrafting = !showCrafting; showInventory = false; updateAvailableRecipes()">🔨</button>
    </div>

    <!-- Click to lock pointer hint -->
    <div class="pointer-hint" *ngIf="joined && !showInventory && !showCrafting"
         (click)="requestPointerLock()">
      Click to play
    </div>
  </div>

  <!-- Inventory overlay -->
  <div class="overlay" *ngIf="showInventory" (click)="showInventory = false">
    <div class="inventory-panel" (click)="$event.stopPropagation()">
      <h3>Inventory</h3>
      <div class="inv-grid">
        <div *ngFor="let slot of inventory; let i = index"
             class="inv-slot"
             [class.hotbar-inv]="i < 9"
             [class.selected]="i === selectedSlot"
             (click)="selectHotbarSlot(i)">
          <div class="item-icon"
               *ngIf="slot.quantity > 0"
               [style.background]="getItemColor(slot.itemId)">
          </div>
          <span class="item-qty" *ngIf="slot.quantity > 1">{{slot.quantity}}</span>
          <div class="item-tooltip" *ngIf="slot.quantity > 0">{{getItemName(slot.itemId)}}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Crafting overlay -->
  <div class="overlay" *ngIf="showCrafting" (click)="showCrafting = false">
    <div class="crafting-panel" (click)="$event.stopPropagation()">
      <h3>Crafting</h3>
      <div class="recipe-list" *ngIf="availableRecipes.length > 0">
        <div *ngFor="let recipe of availableRecipes"
             class="recipe-card"
             (click)="craft(recipe)">
          <div class="recipe-result">
            <div class="item-icon" [style.background]="getItemColor(recipe.result.itemId)"></div>
            <span>{{recipe.name}} x{{recipe.result.quantity}}</span>
          </div>
          <div class="recipe-ingredients">
            <span *ngFor="let ing of recipe.ingredients" class="ingredient">
              {{getItemName(ing.itemId)}} x{{ing.quantity}}
            </span>
          </div>
        </div>
      </div>
      <div *ngIf="availableRecipes.length === 0" class="no-recipes">
        No recipes available. Gather more materials!
      </div>
    </div>
  </div>
</div>
