<div class="closeButton" (click)="closeButtonClicked.emit()" *ngIf="hasClose"></div>
<div class="menuButton" (click)="showMenuClicked.emit();" *ngIf="hasMenu"></div> 
<div class="componentTitle"> 
  <span [class]="titleSpanClass">{{ title }}</span> 
</div>

<app-notifications 
  *ngIf="hasNotifications" 
  [minimalInterface]="true"
  [notificationIconSlot]="numberOfItems"></app-notifications>
