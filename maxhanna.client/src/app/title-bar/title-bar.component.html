<div class="closeButton" *ngIf="showClose" title="Close" (click)="closeClicked.emit()"></div>
<div class="refreshButton" *ngIf="showRefresh" title="Refresh" (click)="refreshClicked.emit()"></div>
<div class="menuButton" *ngIf="showMenu" title="Open Menu" (click)="menuClicked.emit();"></div> 
<div class="helpButton" *ngIf="showHelp" title="Show Help" (click)="helpClicked.emit()"></div>
<div class="searchButton" 
  *ngIf="showSearch" 
  title="Show Search" 
  (click)="searchClicked.emit()" 
  [style.right]="searchRight"
  class="searchButton"
></div>
<div class="menuBackButton" *ngIf="showBack" title="Back to User List" (click)="backClicked.emit();"></div>
<div class="componentTitle" *ngIf="showTitle"><span [class]="titleSpanClass">{{ title }}</span></div>
<app-notifications 
  *ngIf="showNotifications" 
  [minimalInterface]="true"
  [inputtedParentRef]="inputtedParentRef"
  [previousComponent]="previousComponent"
  [notificationIconSlot]="notificationIconSlot"></app-notifications>
