<div class="closeButton" title="Close" (click)="closeClicked.emit()" *ngIf="hasClose"></div>
<div class="refreshButton" title="Refresh" (click)="refreshClicked.emit()" *ngIf="hasRefresh"></div>
<div class="menuButton" title="Open Menu" (click)="menuClicked.emit();" *ngIf="hasMenu"></div> 
<div class="helpButton" title="Show Help" (click)="helpClicked.emit()" *ngIf="hasHelp"></div>
<div class="searchButton" title="Show Search" (click)="searchClicked.emit()" *ngIf="hasSearch && showOwnSearch"></div>
<div class="menuBackButton" title="Back to User List" (click)="backClicked.emit();" *ngIf="hasBack"></div>
<div class="componentTitle" *ngIf="showTitle"><span [class]="titleSpanClass">{{ title }}</span></div>
<app-notifications 
  *ngIf="hasNotifications" 
  [minimalInterface]="true"
  [inputtedParentRef]="inputtedParentRef"
  [previousComponent]="previousComponent"
  [notificationIconSlot]="notificationIconSlot"></app-notifications>
