<div class="globe-wrapper">
  <canvas #globeCanvas class="globe-canvas"></canvas>
  <canvas #pinCanvas class="pin-canvas"></canvas>
  <div class="zoom-controls">
    <label class="zoom-label">🔍</label>
    <input #zoomSlider type="range" min="0" max="100" [value]="zoomSliderValue"
           (input)="onZoomSlider($event)" class="zoom-slider" orient="vertical">
    <label class="zoom-label">🌍</label>
  </div>
</div>
