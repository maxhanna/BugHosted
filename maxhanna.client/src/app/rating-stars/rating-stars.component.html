<span *ngIf="showRatingValueOnly" (click)="openRatingsPanel()">⭐{{rating.value | number:'1.1-1'}}</span>
<span *ngIf="!showRatingValueOnly">
  <span *ngFor="let star of stars; let i = index"
    class="cursorPointer"
    [class]="hoveredIndex !== null && i <= hoveredIndex && !readOnly && isCurrentUser ? 'cursorPointer glowing' : 'cursorPointer'"
    [style.color]="star <= rating.value ? 'gold' : '#555'"
    (click)="onRate(star)"
    (mouseenter)="onStarMouseEnter(i)"
    (mouseleave)="onStarMouseLeave()"
    [title]="readOnly
      ? ('Rated ' + rating.value + ' star' + (rating.value > 1 ? 's' : ''))
      : (isCurrentUser
          ? ('Set your rating to ' + star + ' star' + (star > 1 ? 's' : ''))
          : ('Rated ' + star + ' star' + (star > 1 ? 's' : '')))">
    &#9733;
  </span>
</span>

<span *ngIf="ratingFile && ratingFile.ratingCount && !showRatingValueOnly"
  class="cursorPointer"
  (click)="openRatingsPanel()"
>
  <span class="linkFontColor linkTextDecoration">{{rating.value | number:'1.1-1'}}</span> 
  (<span class="linkFontColor linkTextDecoration">{{ratingFile.ratingCount}}</span>)
</span>

<!-- Ratings Popup Panel -->
<div class="popupPanel ratingPopupPanel" *ngIf="isRatingsPanelOpen && tmpRatingFile">
  <div class="popupPanelTitle" [title]="'Ratings for ' + ratingsTitle">
    ⭐ {{ ratingsTitle }}
  </div>
  <div style="max-height:50vh; width: calc(100% - 50px); overflow:auto; width:100%;">
    <div *ngIf="tmpRatingFile.ratings?.length === 0" style="padding:12px; text-align:center; opacity:0.7;">
      No ratings yet.
    </div>
    <div *ngFor="let r of tmpRatingFile.ratings" class="optionsStatsDiv"
      style="margin-bottom:8px; border-bottom:1px solid var(--main-border-color);">
      <div class="ratingsListContainer">
        <span style="width: unset !important; height: unset !important;">
          <app-user-tag [user]="r.user" 
            [inputtedParentRef]="inputtedParentRef"
            [displayHoverPicture]="true">
          </app-user-tag>
        </span>
        <span style="margin-left:auto; font-size:0.9em;">
          <span *ngFor="let star of stars; let i = index"
            class="cursorPointer"
            [style.color]="star <= r.value ? 'gold' : '#555'"
            [title]="isUserRating(r) ? 'Click to change your rating' : 'Rated ' + r.value + ' star' + (r.value > 1 ? 's' : '')"
            (click)="isUserRating(r) ? rateFile(star) : null"
            [style.cursor]="isUserRating(r) ? 'pointer' : 'default'"
          >
            &#9733;
          </span>
        </span>
      </div>
    </div>
  </div>
  <button id="closeOverlay" (click)="closeRatingsPanel()" class="closeButton" style="margin-top:8px; width: 70px;">Close</button>
</div>
