<div class="popupPanel menuPanel" *ngIf="visible" (pointerdown)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()">
  <div *ngIf="loading"><app-loading-spinner></app-loading-spinner>{{ loadingMessage }}</div>
  <div *ngIf="type === 'login'">
    <app-user [loginOnly]="true" [inputtedParentRef]="inputtedParentRef" [canClose]="false"
      (closeUserComponentEvent)="close.emit($event)"
      [loginReasonMessage]="message">
    </app-user>
  </div>
  <div *ngIf="type === 'share'">
    <app-user-list [inputtedParentRef]="inputtedParentRef" [searchOnly]="true" [sharingSearch]="true" (userClickEvent)="onUserSelected($event)"></app-user-list>
    <div class="selected-users-list" *ngIf="selectedShareUsers.length > 0" style="margin-top: 10px;">
      <label>Selected users:</label>
      <div class="selected-users-tags" style="display: flex; flex-wrap: wrap; gap: 6px;">
        <app-user-tag *ngFor="let user of selectedShareUsers" [user]="user" [inputtedParentRef]="inputtedParentRef" [displayMiniTag]="true"></app-user-tag>
      </div>
    </div>
  </div>
  <div *ngIf="type !== 'login' && message !== ''">
    <div class="prompt-message-row">
      <span *ngIf="icon" class="prompt-emoji">{{ icon }}</span>
      <div> 
        <div *ngFor="let line of finalMessageLines; let i = index">{{ line }}</div> 
      </div>
    </div>
  </div>
  <div *ngIf="type === 'textInput'" style="margin-top:10px; display:flex; gap:6px; align-items:center;">
    <input #textInput [value]="textValue" (input)="textValue = $any($event.target).value" [placeholder]="placeholder" (click)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()" (keydown.enter)="enterTextInput($event)" style="flex:1; padding:8px; border-radius:6px; border:1px solid #666; background:#111; color:#fff;" />
  </div>
  <div *ngIf="type === 'color'" style="margin-top:10px; display:flex; gap:6px; align-items:center;">
    <input #textInput type="color" [value]="textValue || '#ffffff'" (input)="textValue = $any($event.target).value" (click)="$event.stopPropagation()" (touchstart)="$event.stopPropagation()" style="width:56px; height:36px; padding:2px; border-radius:6px; border:1px solid #666; background:#111;" />
    <div style="flex:1"> <span style="color: var(--secondary-font-color);">Selected:</span> <span style="margin-left:8px">{{ textValue || '#ffffff' }}</span> </div>
  </div>
  <div *ngIf="type === 'face'" style="margin-top:10px; display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; max-width:280px;">
    <button *ngFor="let f of faceOptions" (click)="textValue = f; $event.stopPropagation()" 
      [style.background]="textValue === f ? '#444' : '#222'" 
      [style.border]="textValue === f ? '2px solid #4af' : '1px solid #555'"
      style="padding:8px; border-radius:6px; cursor:pointer; color:#fff; font-size:12px;">{{ f }}</button>
  </div>
  <div class="promptButtonContainer">
    <button *ngIf="showSpecialAction" id="specialActionButton"
      (click)="$event.stopPropagation(); specialActionCallback && specialActionCallback()" class="specialActionButton"
      [attr.title]="specialActionButtonLabel">
      {{ specialActionButtonLabel }}
    </button>
    <button *ngIf="type === 'textInput'" (pointerdown)="enterTextInput($event)" class="specialActionButton">Send</button>
    <button *ngIf="type === 'color'" (pointerdown)="$event.stopPropagation(); submit.emit(textValue); close.emit();" class="specialActionButton">Apply</button> 
    <button *ngIf="type === 'face'" (pointerdown)="$event.stopPropagation(); submit.emit(textValue); close.emit();" class="specialActionButton">Apply</button> 
    <button *ngIf="type === 'confirm'" (pointerdown)="$event.stopPropagation(); submit.emit('yes'); close.emit();" class="specialActionButton">Yes</button> 
    <button *ngIf="type === 'confirm'" id="closeOverlay" (pointerdown)="$event.stopPropagation(); submit.emit('no'); close.emit();" class="closeButton">No</button>
    <button *ngIf="type !== 'confirm'" id="closeOverlay" (pointerdown)="$event.stopPropagation(); close.emit($event)" class="closeButton">Close</button>
  </div> 
</div>
