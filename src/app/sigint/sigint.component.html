<div class="sigint-container">
  <app-title-bar [title]="'Signals Intelligence'"></app-title-bar>
  
  <div class="sigint-main">
    <div class="globe-container">
      <div class="globe" id="globe"></div>
    </div>
    
    <div class="data-panels">
      <div class="panel flight-tracker">
        <h3>Flight Tracker</h3>
        <div class="panel-content">Flight data visualization</div>
      </div>
      
      <div class="panel shipment">
        <h3>Shipment Data</h3>
        <div class="panel-content">Shipment tracking information</div>
      </div>
      
      <div class="panel conflict">
        <h3>Conflict Zones</h3>
        <div class="panel-content">Conflict area information</div>
      </div>
      
      <div class="panel weather">
        <h3>Weather Data</h3>
        <div class="panel-content">Weather conditions and cloud coverage</div>
      </div>
      
      <div class="panel traffic">
        <h3>Traffic Data</h3>
        <div class="panel-content">Traffic flow information</div>
      </div>
    </div>
  </div>
</div>
